services:
  bidder:
    build: .
    image: clearledger-bidder-openrtb:local
    ports:
      - "8080:8080"
    environment:
      BIDDER_OPENRTB_AUTH_TOKEN: ${BIDDER_OPENRTB_AUTH_TOKEN:-token}
      BIDDER_OPENRTB_SIGNING_SECRET: ${BIDDER_OPENRTB_SIGNING_SECRET:-secret}
      BIDDER_OPENRTB_REQUIRE_AUTH: ${BIDDER_OPENRTB_REQUIRE_AUTH:-true}
      BIDDER_OPENRTB_REQUIRE_SIGNATURE: ${BIDDER_OPENRTB_REQUIRE_SIGNATURE:-true}
      BIDDER_PUBLIC_ENDPOINT: ${BIDDER_PUBLIC_ENDPOINT:-http://localhost:8080}
      BIDDER_OPENRTB_ACCEPTED_VERSIONS: ${BIDDER_OPENRTB_ACCEPTED_VERSIONS:-2.6,2.5}
      BIDDER_OPENRTB_OUTBOUND_VERSION: ${BIDDER_OPENRTB_OUTBOUND_VERSION:-2.6}
      BIDDER_OPENRTB_COMPAT_PROFILE: ${BIDDER_OPENRTB_COMPAT_PROFILE:-openrtb_json}
      BIDDER_OPENRTB_PRESERVE_PARTNER_EXT: ${BIDDER_OPENRTB_PRESERVE_PARTNER_EXT:-true}
      BIDDER_HTTP_READ_HEADER_TIMEOUT_MS: ${BIDDER_HTTP_READ_HEADER_TIMEOUT_MS:-500}
      BIDDER_HTTP_READ_TIMEOUT_MS: ${BIDDER_HTTP_READ_TIMEOUT_MS:-2000}
      BIDDER_HTTP_WRITE_TIMEOUT_MS: ${BIDDER_HTTP_WRITE_TIMEOUT_MS:-2000}
      BIDDER_MAX_REQUEST_BODY_BYTES: ${BIDDER_MAX_REQUEST_BODY_BYTES:-262144}
