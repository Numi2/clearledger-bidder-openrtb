name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go run ./cmd/configcheck -config config/campaigns.sample.json
      - run: make bench-guard
      - run: docker build -t clearledger-bidder-openrtb:ci .
